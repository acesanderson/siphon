            - paragraph [ref=e389]: But if you just ask "output a confidence score from 0.0 to 1.0," the model is operating in an unconstrained space. It's guessing at what the numbers mean. You get 0.73, 0.68, 0.71 — that granularity is illusory. It's noise dressed up as precision.
