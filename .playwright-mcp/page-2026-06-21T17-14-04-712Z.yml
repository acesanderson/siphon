            - generic [ref=e315]: "\"I'm building an LLM-as-judge binary classifier to label LinkedIn Skills taxonomy entries as TRUE ('is a software product') or FALSE ('is not a software product'). The classifier outputs three fields: a binary judgment, a rationale string, and a confidence measure. I'll use low-confidence outputs to identify edge cases for a human annotation pass, which then feeds back to improve the prompt. Should confidence be a categorical enum (LOW / MEDIUM / HIGH) or a float (0.0–1.0)? My prior is that LLMs are poorly calibrated on floats and a three-tier ordinal is more honest — but I want to know if there's an eval methodology reason to prefer one over the other.\""
          - generic [ref=e316]:
            - paragraph [ref=e321]: Your prior is spot on, and I want to validate the reasoning before answering the direct question.
            - paragraph [ref=e326]:
              - text: You're right that LLMs are poorly calibrated on floats. If you ask Claude "rate your confidence 0.0 to 1.0," you'll get a distribution heavily skewed toward 0.7-0.9 where the model is essentially just saying "I'm pretty sure." The granularity becomes noise. And you're also right to be suspicious of confidence as a general metric — it doesn't reliably correlate with accuracy.
              - button "4" [ref=e328] [cursor=pointer]:
                - generic [ref=e329]: "4"
            - paragraph [ref=e334]: "But here's the thing: for your specific use case (flagging edge cases for human review), the form you choose matters less than whether confidence actually correlates with your annotation problem."
            - generic [ref=e338]:
              - paragraph [ref=e339]: "The categorical approach (LOW/MEDIUM/HIGH) has real practical advantages:"
              - paragraph [ref=e340]: "It forces the model to make a clearer distinction. Instead of outputting 0.62 (which could mean anything), it has to commit to a tier. That commitment is often more honest because the model isn't pretending to precision it doesn't have. You get cleaner signal for triaging: \"flag anything marked LOW or MEDIUM for human review\" is a clear policy. A threshold of 0.5 on a float feels arbitrary by comparison."
            - paragraph [ref=e345]: It also reduces cognitive load downstream. Your annotation team sees three buckets, not fine-grained scores. That simplicity matters when you're building feedback loops.
            - generic [ref=e349]:
              - paragraph [ref=e350]: "The float approach gives you:"
              - paragraph [ref=e351]: Flexibility in threshold setting and calibration downstream. If you apply isotonic regression or Platt scaling, you can map raw model scores to true probabilities and threshold based on your actual cost of error. That's powerful if you have enough labeled data to fit a calibrator properly.
            - generic [ref=e355]:
              - paragraph [ref=e356]: "What I'd actually recommend:"
              - paragraph [ref=e357]: Start with categorical (LOW/MEDIUM/HIGH). Run your first annotation pass, measure how well the model's confidence tier predicts which cases humans disagree on or flag as truly ambiguous. If that correlation is strong, you're done — the categorical approach is doing its job and it's maintainable.
            - paragraph [ref=e362]: Only graduate to floats if you later need the granularity for something specific, like fitting a calibrator because you're doing prevalence correction across a biased sample. That's an optimization you add when you have evidence it's necessary, not upfront.
            - paragraph [ref=e367]: "The key insight: confidence is most useful when it actually predicts annotation difficulty. If three-tier confidence correlates with \"cases the annotators debated,\" that's your signal that it's working. Check that before you decide on the representation."
            - paragraph [ref=e372]: Are you planning to validate confidence against inter-annotator disagreement on your LinkedIn Skills taxonomy, or is the human review step more of a quick sanity check?
