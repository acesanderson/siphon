          - paragraph [ref=e755]:
            - strong [ref=e756]: "Task 2: Speaker Attributed ASR"
            - text: "— transcription with speaker labels:"
          - generic [ref=e757]:
            - code [ref=e759]: "SAA_PROMPT = \"<|audio|> Speaker attribution: Transcribe and denote who is speaking by adding [Speaker 1]: and [Speaker 2]: tags before speaker turns.\" saa_text = transcribe(audio.data, SAA_PROMPT) for segment in re.split(r\"(\\[Speaker \\d+\\]:)\", saa_text): print(segment.strip())"
