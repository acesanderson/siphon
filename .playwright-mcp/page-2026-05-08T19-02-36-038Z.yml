            - generic [ref=e804]: Training Data
          - paragraph [ref=e805]:
            - text: The model was trained on the same datasets as
            - link "Granite-Speech-4.1-2B" [ref=e806] [cursor=pointer]:
              - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b
            - text: .
          - paragraph [ref=e807]: Additional training data for SAA was created using audio segments from datasets that have speaker identification (e.g. Multilingual-Librispeech). Segments with alternating speakers were concatenated to create a long multi-speaker sample.
          - heading "Training Data for Timestamps" [level=3] [ref=e808]:
            - link [ref=e809] [cursor=pointer]:
              - /url: "#training-data-for-timestamps"
              - img [ref=e811]
            - generic [ref=e813]: Training Data for Timestamps
          - paragraph [ref=e814]: "Word-level timestamping capabilities are achieved by using a combination of publicly available speech corpora: LibriSpeech, MLS (en, fr, de, pt, es), CommonVoice (en, fr, de, pt, es), VoxPopuli (en, fr, de, es), AMI-IHM, Switchboard, TIMIT and YODAS. For AMI-IHM, Switchboard and TIMIT, we use the available timestamp annotations. For all other datasets, we obtain word-level alignments using the Montreal Forced Aligner (MFA), a GMM-HMM based forced alignment tool. We also use MFA to insert silence boundaries into the manually annotated datasets."
          - paragraph [ref=e815]: "To ensure high-quality training data, we validate the MFA-derived alignments using forced alignments with our CTC-based speech encoder. We compute the Accumulated Average Shift (AAS), the mean absolute error between timestamps in milliseconds, for the CTC and MFA alignments and retain only samples with the lowest alignment error: the top 95% for English and top 70% for non-English data. For the larger datasets (YODAS and MLS-en), we cap the training data at 4M and 5M samples, respectively."
          - paragraph [ref=e816]: Additional training data containing long audio samples with timestamps were generated by concatenation of short segments.
          - paragraph [ref=e817]: The model was trained on audio samples up to 10 minutes for ASR and SAA, and up to 5 minutes for timestamps.
          - heading "Infrastructure" [level=2] [ref=e818]:
            - link [ref=e819] [cursor=pointer]:
              - /url: "#infrastructure"
              - img [ref=e821]
            - generic [ref=e823]: Infrastructure
          - paragraph [ref=e824]: We train Granite Speech using IBM's supercomputing cluster, Blue Vela, which is outfitted with NVIDIA H100 GPUs. This cluster provides a scalable and efficient infrastructure for training our models over thousands of GPUs. The training of this particular model was completed in about 5 days on 32 H100 GPUs.
          - heading "Ethical Considerations and Limitations" [level=2] [ref=e825]:
            - link [ref=e826] [cursor=pointer]:
              - /url: "#ethical-considerations-and-limitations"
              - img [ref=e828]
            - generic [ref=e830]: Ethical Considerations and Limitations
          - paragraph [ref=e831]: The use of Large Speech and Language Models can trigger certain risks and ethical considerations. Although our alignment processes include safety considerations, the model may in some cases produce inaccurate, biased, offensive or unwanted responses to user prompts. Additionally, whether smaller models may exhibit increased susceptibility to hallucination in generation scenarios due to their reduced sizes, which could limit their ability to generate coherent and contextually accurate responses, remains uncertain. This aspect is currently an active area of research, and we anticipate more rigorous exploration, comprehension, and mitigations in this domain.
          - paragraph [ref=e832]: IBM recommends using this model for automatic speech recognition and translation tasks. The model's design improves safety by limiting how audio inputs can influence the system. If an unfamiliar or malformed prompt is received, the model simply ignores it and performs transcription, which is the default fallback mode. This minimizes the risk of adversarial inputs, unlike integrated models that directly interpret audio and may be more exposed to such attacks. Note that more general speech tasks may pose higher inherent risks of triggering unwanted outputs.
          - paragraph [ref=e833]: To enhance safety, we recommend using Granite-Speech-4.1-2B-Plus alongside Granite Guardian. Granite Guardian is a fine-tuned instruct model designed to detect and flag risks in prompts and responses across key dimensions outlined in the IBM AI Risk Atlas.
