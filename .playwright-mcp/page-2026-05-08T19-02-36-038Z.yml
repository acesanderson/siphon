          - paragraph [ref=e745]:
            - strong [ref=e746]: "Task 1: ASR"
            - text: "— plain speech-to-text transcription:"
          - generic [ref=e747]:
            - code [ref=e749]: ASR_PROMPT = "<|audio|> can you transcribe the speech into a written format?" asr_text = transcribe(audio.data, ASR_PROMPT) print(asr_text)
            - button [ref=e750] [cursor=pointer]:
