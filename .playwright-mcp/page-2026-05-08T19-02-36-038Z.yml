          - paragraph [ref=e726]: "Load the model and define a general function for decoding the audio:"
          - generic [ref=e727]:
            - code [ref=e729]:
              - text: "MODEL_NAME = \"ibm-granite/granite-speech-4.1-2b-plus\" device = \"cuda\" if torch.cuda.is_available() else \"cpu\" processor = AutoProcessor.from_pretrained(MODEL_NAME) tokenizer = processor.tokenizer model = AutoModelForSpeechSeq2Seq.from_pretrained(MODEL_NAME, device_map=device, dtype=torch.bfloat16) model.eval() SYSTEM_PROMPT = \"Knowledge Cutoff Date: April 2024.\\nToday's Date: December 19, 2024.\\nYou are Granite, developed by IBM. You are a helpful AI assistant\" @torch.inference_mode() def transcribe("
              - generic [ref=e730]: audio, prompt, max_new_tokens=2000, prefix_text=None
              - text: "): chat = [{\"role\": \"system\", \"content\": SYSTEM_PROMPT}, {\"role\": \"user\", \"content\": prompt}] extra = {\"prefix_text\": prefix_text} if prefix_text is not None else {} prompt_text = tokenizer.apply_chat_template(chat, tokenize=False, add_generation_prompt=True, **extra) inputs = processor(prompt_text, audio, device=device, return_tensors=\"pt\").to(device) outputs = model.generate(**inputs, max_new_tokens=max_new_tokens, do_sample=False, num_beams=1) new_tokens = outputs[0, inputs[\"input_ids\"].shape[-1]:] output_text = tokenizer.decode(new_tokens, add_special_tokens=False, skip_special_tokens=True) return output_text"
            - button [ref=e731] [cursor=pointer]:
