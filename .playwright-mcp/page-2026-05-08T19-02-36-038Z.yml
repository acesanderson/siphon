          - paragraph [ref=e765]:
            - strong [ref=e766]: "Task 3: Word-level timestamps"
            - text: "— transcription with per-word timing:"
          - paragraph [ref=e767]: The timestamps are given in centiseconds and are modulo 1000 (=10 seconds) so we need to unwrap them by adding multiples of 10 seconds.
          - generic [ref=e768]:
            - code [ref=e770]:
              - text: "TS_PROMPT = \"<|audio|> Timestamps: Transcribe the speech. After each word, add a timestamp tag showing the end time in centiseconds, e.g. hello [T:45] world [T:82]\" ts_text = transcribe(audio.data, TS_PROMPT, max_new_tokens=10000) ts_words = re.split(r\"\\[T:(\\d+)\\]\", ts_text) last_word_end_time = 0 offset_time = 0 for word, ts in zip(ts_words[::2], ts_words[1::2]): word_end_time = float(ts) / 100 while word_end_time + offset_time < last_word_end_time: offset_time += 10 last_word_end_time = word_end_time + offset_time print("
              - generic [ref=e771]:
                - text: "f\"{word}\\t"
                - generic [ref=e772]: "{last_word_end_time:.2f}"
                - text: s"
              - text: )
            - button [ref=e773] [cursor=pointer]:
              - img [ref=e774]
          - paragraph [ref=e778]:
            - strong [ref=e779]: "Task 4: Incremental decoding"
            - text: "— transcribe segments while accumulating audio context:"
          - generic [ref=e780]:
            - code [ref=e782]:
              - text: "NUM_SEGMENTS = 3 previous_transcript = \"\" all_audio = None for k in range(NUM_SEGMENTS): t1 = START_TIME + (END_TIME - START_TIME) * k / NUM_SEGMENTS t2 = START_TIME + (END_TIME - START_TIME) * (k + 1) / NUM_SEGMENTS new_audio = ds[\"audio\"][TEST_SAMPLE].get_samples_played_in_range(t1, t2) all_audio = new_audio.data if all_audio is None else torch.cat([all_audio, new_audio.data], dim=-1) saa_text = transcribe(all_audio, SAA_PROMPT, prefix_text=previous_transcript) print("
              - generic [ref=e783]:
                - text: f"
                - generic [ref=e784]: "{t1:06.2f}"
                - text: "-"
                - generic [ref=e785]: "{t2:06.2f}"
                - text: ":\\t{saa_text}\""
              - text: ) previous_transcript = (previous_transcript + " " + saa_text).strip()
