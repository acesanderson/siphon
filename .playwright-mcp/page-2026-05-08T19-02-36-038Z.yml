        - generic [ref=e232]:
          - heading "Granite-Speech-4.1-2B-Plus" [level=1] [ref=e233]:
            - link [ref=e234] [cursor=pointer]:
              - /url: "#granite-speech-41-2b-plus"
              - img [ref=e236]
            - generic [ref=e238]: Granite-Speech-4.1-2B-Plus
          - heading "Model Summary" [level=2] [ref=e239]:
            - link [ref=e240] [cursor=pointer]:
              - /url: "#model-summary"
              - img [ref=e242]
            - generic [ref=e244]: Model Summary
          - paragraph [ref=e245]:
            - text: Granite-Speech-4.1-2B-Plus has similar capabilities to the
            - link "Granite-Speech-4.1-2B" [ref=e246] [cursor=pointer]:
              - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b
            - text: "model. The plus model adds two new community-requested rich transcription features that can be activated with a simple prompt change: speaker-attributed ASR (speaker labels and word transcripts) and word-level timing information. Unlike the base mode, the plus model doesn't provide punctuation and capitalization."
          - paragraph [ref=e247]:
            - text: The model was trained on corpora similar to the
            - link "Granite-Speech-4.1-2B" [ref=e248] [cursor=pointer]:
              - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b
            - text: model which were augmented with speaker turns and word-level timestamp tags. This allows the model to provide different modes of functionality controlled by different prompts.
          - paragraph [ref=e249]: "Two additional model variants explore different capabilities and inference optimization:"
          - list [ref=e250]:
            - listitem [ref=e251]:
              - link "Granite-Speech-4.1-2B" [ref=e252] [cursor=pointer]:
                - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b
              - text: for applications where accuracy is the primary concern with support for punctuated, capitalized transcripts, AST and keyword-biased recognition, and includes Japanese.
            - listitem [ref=e253]:
              - link "Granite-Speech-4.1-2B-NAR" [ref=e254] [cursor=pointer]:
                - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b-nar
              - text: introduces a novel non-autoregressive architecture for higher throughput
          - heading "ASR only mode" [level=3] [ref=e255]:
            - link [ref=e256] [cursor=pointer]:
              - /url: "#asr-only-mode"
              - img [ref=e258]
            - generic [ref=e260]: ASR only mode
          - paragraph [ref=e261]:
            - text: In this mode the model generates only the text transcript similar to the
            - link "Granite-Speech-4.1-2B" [ref=e262] [cursor=pointer]:
              - /url: https://huggingface.co/ibm-granite/granite-speech-4.1-2b
            - text: model.
          - heading "Speaker attributed ASR (SAA)" [level=3] [ref=e263]:
            - link [ref=e264] [cursor=pointer]:
              - /url: "#speaker-attributed-asr-saa"
              - img [ref=e266]
            - generic [ref=e268]: Speaker attributed ASR (SAA)
          - paragraph [ref=e269]:
            - text: In this mode, the model adds speaker tags in the format of
            - code [ref=e270]: "[Speaker N]:"
            - text: where $N$ is the speaker number, before each speaker turn. The speakers are numbered by their order of appearance so the first speaker will always be marked with
            - code [ref=e271]: "[Speaker 1]:"
            - text: and the second with
            - code [ref=e272]: "[Speaker 2]:"
            - text: ", etc. For example:"
            - code [ref=e273]: "\"[Speaker 1]: Hello how are you [Speaker 2]: I'm fine and how are you feeling [Speaker 1]: I feel wonderful\""
            - text: .
          - paragraph [ref=e274]:
            - text: See
            - link "Resources" [ref=e275] [cursor=pointer]:
              - /url: "#resources"
            - text: for more information about SAA.
          - heading "Word-level timestamps" [level=3] [ref=e276]:
            - link [ref=e277] [cursor=pointer]:
              - /url: "#word-level-timestamps"
              - img [ref=e279]
            - generic [ref=e281]: Word-level timestamps
          - paragraph [ref=e282]:
            - text: In this mode, the model adds timestamp tags after each word indicating the end of the word in the audio. Silences are transcribed as
            - code [ref=e283]: _
            - text: and a timestamp tag also indicates their end. The format of the tag is
            - code [ref=e284]: "[T:N]"
            - text: where $N$ is an integer number indicating the time in centiseconds (1/100th of a second). To reduce the amount of generated tokens, only the last three digits of $N$ are provided. This causes a rollover after 10 seconds.
          - paragraph [ref=e285]: The conversion from time $t$ in seconds to timestamp is $N = round(t*100) \mod 1000$. To convert back to seconds, use $t = N/100 + 10R$ where $R$ is the rollover counter. See code below for example implementation in Python.
          - paragraph [ref=e286]:
            - text: See
            - link "Resources" [ref=e287] [cursor=pointer]:
              - /url: "#resources"
            - text: for more information about timestamps.
          - heading "Incremental decoding" [level=3] [ref=e288]:
            - link [ref=e289] [cursor=pointer]:
              - /url: "#incremental-decoding"
              - img [ref=e291]
            - generic [ref=e293]: Incremental decoding
          - paragraph [ref=e294]:
            - text: There are cases where we want to transcribe a new audio segment along with previous segments that we've already transcribed. This can be useful for providing longer context for the model in order to improve transcription accuracy or to maintain the speaker numbering in SAA mode. To avoid re-decoding the previous segments, we can provide the previous transcription in the
            - code [ref=e295]: prefix_text
            - text: field of the conversation template. The model will decode the parts after that. See the code below for examples.
          - heading "Keyword list biasing (KWB)" [level=3] [ref=e296]:
            - link [ref=e297] [cursor=pointer]:
              - /url: "#keyword-list-biasing-kwb"
              - img [ref=e299]
            - generic [ref=e301]: Keyword list biasing (KWB)
          - paragraph [ref=e302]:
            - text: "Keyword list biasing capability is available to enhance the recognition of keywords, such as names and technical terms. This is particularly useful in tasks where complex terms may otherwise be misrecognized. Keyword biasing can be applied by including the keywords directly in the prompt; for example, in ASR mode:"
            - code [ref=e303]: "Can you transcribe the speech into a written format? Keywords: …"
          - paragraph [ref=e304]: Users may provide either a single keyword or a list of keywords, which may also include terms that do not appear in the input audio, making them well suited for batch processing or recurring domain-specific use cases.
          - paragraph [ref=e305]:
            - text: See
            - link "Resources" [ref=e306] [cursor=pointer]:
              - /url: "#resources"
            - text: for more information about keyword list biasing.
          - heading "Evaluations" [level=2] [ref=e307]:
            - link [ref=e308] [cursor=pointer]:
              - /url: "#evaluations"
              - img [ref=e310]
            - generic [ref=e312]: Evaluations
          - paragraph [ref=e313]: Our evaluations showed that this model works well with audio segments up to 9 minutes long for ASR and SAA, and up to 5 minutes for timestamps.
