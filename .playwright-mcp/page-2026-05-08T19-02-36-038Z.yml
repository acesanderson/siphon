          - paragraph [ref=e716]:
            - strong [ref=e717]: Setup
            - text: "— load the model and a test audio clip:"
          - generic [ref=e718]:
            - code [ref=e720]: import re import torch from datasets import Audio, load_dataset from transformers import AutoModelForSpeechSeq2Seq, AutoProcessor
            - button [ref=e721] [cursor=pointer]:
